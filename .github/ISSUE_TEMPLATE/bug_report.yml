name: Bug Report
description: Something is not working as expected.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behaviour.
      placeholder: |
        1. Open the app
        2. Navigate to ...
        3. Tap ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: Version number shown in Settings → About.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device
      description: Device model and Android version.
      placeholder: "Pixel 7, Android 14 (API 34)"
    validations:
      required: true

  - type: input
    id: mode
    attributes:
      label: Operating Mode
      description: Which mode is the app running in?
      placeholder: "AI Premium / AI Compact / Light"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logcat output, if available.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, screen recordings, or any other context.
    validations:
      required: false
