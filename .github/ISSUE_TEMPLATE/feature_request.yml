name: Feature Request
description: Propose a new feature or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check that no existing issue covers this request.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What is the current limitation?
      placeholder: "As a user, I find it frustrating when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you have considered.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Affected Area
      options:
        - Game mechanics
        - AI / LLM integration
        - Onboarding
        - Chat (post-game)
        - Settings
        - Home screen
        - Performance
        - Accessibility
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Mockups, references, or any other context.
    validations:
      required: false
